# Optional local smoke stack only.
# Production on Railway should use Postgres-backed Temporal and separate managed services.
services:
  assistant-db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assistant"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.28.1
    environment:
      DB: sqlite
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development.yaml
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.39.0
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8088:8080"
    depends_on:
      - temporal

  miniflux-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: miniflux
      POSTGRES_USER: miniflux
      POSTGRES_PASSWORD: miniflux

  miniflux:
    image: miniflux/miniflux:2.2.13
    environment:
      DATABASE_URL: postgres://miniflux:miniflux@miniflux-db/miniflux?sslmode=disable
      RUN_MIGRATIONS: 1
      CREATE_ADMIN: 1
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: adminadmin
    ports:
      - "8080:8080"
    depends_on:
      - miniflux-db
