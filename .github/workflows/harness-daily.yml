name: harness-daily

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.12
      - run: uv sync --dev
      - run: uv run python scripts/generate_harness_snapshot.py
      - name: Commit snapshot
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add docs/experiments/harness/*.md
          git commit -m "chore(harness): add daily snapshot"
          git push
